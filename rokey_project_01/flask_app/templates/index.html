<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>레고 블록 자동 조립 시스템</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>레고 블록 자동 조립 시스템</h1>

<!-- 1. 이미지 업로드 & 분석 -->
<section>
  <h2>1. 이미지 분석</h2>
  <input type="file" id="file-input" accept="image/*">
  <img id="preview" alt="미리보기">
  <div class="row">
    <label>격자 크기
      <select id="grid-size">
        <option value="8">8 &times; 8</option>
        <option value="16" selected>16 &times; 16</option>
        <option value="24">24 &times; 24</option>
        <option value="32">32 &times; 32</option>
      </select>
    </label>
    <button id="btn-analyze" disabled>분석 요청</button>
  </div>
</section>

<!-- 2. 분석 결과 & 조립 시작 -->
<section id="section-result" class="hidden">
  <h2>2. 분석 결과</h2>
  <canvas id="grid-canvas" width="320" height="320"></canvas>
  <button id="btn-start">조립 시작</button>
</section>

<!-- 3. 진행 상황 -->
<section>
  <h2>3. 진행 상황</h2>
  <div id="status" class="status-text">대기 중</div>
  <div class="progress-bar"><div id="progress-fill"></div></div>
  <div id="progress-text">0 / 0</div>
  <div class="row">
    <button id="btn-pause" disabled>일시정지</button>
    <button id="btn-resume" disabled>재개</button>
  </div>
</section>

<!-- 4. 로그 -->
<section>
  <h2>시스템 로그</h2>
  <div id="log-stream"></div>
</section>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/static/main.js"></script>
</body>
</html>
