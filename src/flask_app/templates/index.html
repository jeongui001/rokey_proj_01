<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>레고 블록 자동 조립 시스템</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>레고 블록 자동 조립 시스템</h1>

<section>
  <h2>1. 이미지 분석</h2>
  <input type="file" id="file-input" accept="image/*">
  <div id="preview-wrapper">
    <img id="preview" alt="미리보기">
    <canvas id="roi-canvas"></canvas>
  </div>
  <p id="roi-hint" class="hint" style="display:none">이미지 위를 드래그하여 분석할 영역을 선택하세요. 선택하지 않으면 전체 이미지를 사용합니다.</p>
  <div class="row" id="roi-controls" style="display:none">
    <button id="btn-clear-roi">ROI 초기화</button>
  </div>
  <div class="row">
    <label>가로(열): <input type="number" id="input-cols" value="16" min="1" max="32"></label>
    <label>세로(행): <input type="number" id="input-rows" value="8" min="1" max="32"></label>
    <button id="btn-analyze" disabled>분석 요청</button>
  </div>
  <div id="analyze-status" class="hint" style="display:none">분석 중...</div>
</section>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/static/main.js"></script>
</body>
</html>
