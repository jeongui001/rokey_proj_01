<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>레고 블록 자동 조립 시스템</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>레고 블록 자동 조립 시스템</h1>

<!-- 1. 이미지 업로드 & 분석 -->
<section>
  <h2>1. 이미지 분석</h2>
  <input type="file" id="file-input" accept="image/*">
  <div id="preview-wrapper">
    <img id="preview" alt="미리보기">
    <canvas id="roi-canvas"></canvas>
  </div>
  <p id="roi-hint" class="hint" style="display:none">이미지 위를 드래그하여 분석할 영역을 선택하세요. 선택하지 않으면 전체 이미지를 사용합니다.</p>
  <div class="row" id="roi-controls" style="display:none">
    <button id="btn-clear-roi">ROI 초기화</button>
  </div>
  <div class="row">
    <label>가로(열): <input type="number" id="input-cols" value="16" min="1" max="32"></label>
    <label>세로(행): <input type="number" id="input-rows" value="8" min="1" max="32"></label>
    <button id="btn-analyze" disabled>분석 요청</button>
  </div>
</section>

<!-- 2. 분석 결과 & 편집 & 조립 시작 -->
<section id="section-result" class="hidden">
  <h2>2. 분석 결과 편집</h2>
  <p class="hint">셀 클릭 → 색상 변경 / 우클릭 → 비우기</p>
  <div id="color-palette"></div>
  <canvas id="grid-canvas" width="480" height="200"></canvas>
  <div class="row">
    <button id="btn-update">수정 반영</button>
    <button id="btn-start">조립 시작</button>
  </div>
  <div id="block-summary" class="hidden">
    <h3>블록 요약</h3>
    <div id="block-summary-table"></div>
  </div>
</section>

<!-- 3. 진행 상황 -->
<section>
  <h2>3. 진행 상황</h2>
  <div id="status" class="status-text">대기 중</div>
  <div class="progress-bar"><div id="progress-fill"></div></div>
  <div id="progress-text">0 / 0</div>
  <div class="row">
    <button id="btn-pause" disabled>일시정지</button>
    <button id="btn-resume" disabled>재개</button>
  </div>
</section>

<!-- 4. 로그 -->
<section>
  <h2>시스템 로그</h2>
  <div id="log-stream"></div>
</section>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/static/main.js"></script>
</body>
</html>
