<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>진행 상황 — 레고 조립 시스템</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>레고 블록 자동 조립 시스템</h1>

<div class="page-nav">
  <span class="nav-step done">1. 이미지 분석</span>
  <span class="nav-arrow">›</span>
  <span class="nav-step done">2. 분석 결과 편집</span>
  <span class="nav-arrow">›</span>
  <span class="nav-step active">3. 진행 상황</span>
</div>

<section>
  <h2>3. 진행 상황</h2>
  <div id="status" class="status-text">조립 시작 중...</div>
  <div class="progress-bar"><div id="progress-fill"></div></div>
  <div id="progress-text">0 / 0</div>
  <div class="row">
    <button id="btn-pause" disabled>일시정지</button>
    <button id="btn-resume" disabled>재개</button>
    <button id="btn-home">← 처음으로</button>
  </div>
</section>

<section>
  <h2>시스템 로그</h2>
  <div id="log-stream"></div>
</section>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/static/main.js"></script>
</body>
</html>
