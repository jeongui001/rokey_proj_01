/**:
  ros__parameters:
    video_device: /dev/video0
    framerate: 30.0
    io_method: mmap
    frame_id: front_camera_optical_frame
    pixel_format: mjpeg2rgb
    av_device_format: YUV422P
    image_width: 640
    image_height: 480
    camera_name: front_camera
    camera_info_url: package://vision_camera_bringup/config/front_camera_info.yaml

    brightness: -1
    contrast: -1
    saturation: -1
    sharpness: -1
    gain: -1
    auto_white_balance: true
    white_balance: 4000
    autoexposure: true
    exposure: 100
    autofocus: false
    focus: -1
