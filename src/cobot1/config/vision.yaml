# Shared configuration for ImageProcessor and VerifyNode.
# Default backend is model-free OpenCV connected-component instance segmentation so
# the stack can launch immediately. For production, override each node with a
# custom Ultralytics segmentation model as documented in README.md.

palette:
  confidence_scale: 45.0
  entries:
    - {name: red,    rgb: [220, 35, 35],   occupied: true}
    - {name: blue,   rgb: [35, 80, 220],   occupied: true}
    - {name: green,  rgb: [40, 180, 70],   occupied: true}
    - {name: yellow, rgb: [235, 210, 45],  occupied: true}
    - {name: white,  rgb: [225, 225, 225], occupied: true}
    - {name: black,  rgb: [25, 25, 25],    occupied: true}
    # Replace this RGB with the actual empty workspace/background appearance.
    - {name: empty,  rgb: [95, 95, 95],    occupied: false}

mosaic:
  fit_mode: center_crop       # center_crop | letterbox | stretch
  default_output_width: 512
  default_output_height: 512
  max_grid_size: 32
  draw_grid: true
  grid_line_thickness: 1

segmentation:
  defaults:
    confidence_threshold: 0.25
    iou_threshold: 0.70
    image_size: 640
    mask_threshold: 0.50
    min_mask_area_px: 100
    max_instances: 200
    device: auto
    half: false
    agnostic_nms: false
    allowed_classes: []
    allowed_class_ids: []

  image_processor:
    backend: opencv_components
    model_path: ""
    background_mode: border_lab
    border_fraction: 0.06
    background_lab_distance: 18.0
    split_by_color: true
    color_clusters: 7
    kmeans_max_samples: 30000
    morph_kernel: 3
    open_iterations: 1
    close_iterations: 1
    class_name: object
    class_id: 0

  verifier:
    backend: opencv_components
    model_path: ""
    background_mode: border_lab
    border_fraction: 0.05
    background_lab_distance: 20.0
    split_by_color: true
    color_clusters: 7
    kmeans_max_samples: 30000
    morph_kernel: 3
    open_iterations: 1
    close_iterations: 1
    min_mask_area_px: 180
    class_name: block
    class_id: 0

# Every cell is derived from dominant INSTANCE MASK overlap; raw full-cell colour
# averaging is not used. Colour is taken from a mapped model class when possible,
# then from pixels inside the selected instance mask.
grid_projection:
  empty_palette_name: empty
  color_source: class_then_pixels       # class | pixels | class_then_pixels
  class_to_palette:
    red: red
    red_block: red
    blue: blue
    blue_block: blue
    green: green
    green_block: green
    yellow: yellow
    yellow_block: yellow
    white: white
    white_block: white
    black: black
    black_block: black

  min_instance_confidence: 0.20
  min_cell_coverage: 0.10
  conflict_cell_coverage: 0.08
  coverage_saturation: 0.58
  mask_erosion_px: 1
  min_color_pixels: 12
  contour_max_points: 64
  overlay_alpha: 0.42
  confidence_weights:
    instance: 0.45
    coverage: 0.35
    color: 0.20

workspace:
  base_frame: base_link
  camera_frame: front_camera_optical_frame
  rectify_image: true

  # Four corners in the RECTIFIED camera image:
  # top-left, top-right, bottom-right, bottom-left.
  # These are examples and must be calibrated for the physical workspace.
  roi_normalized:
    - [0.20, 0.15]
    - [0.80, 0.15]
    - [0.80, 0.88]
    - [0.20, 0.88]

  # Used when ProcessMosaic.fixed_axis is empty. Units are metres.
  fixed_axis_default: x
  fixed_axis_value_default: 0.50
  target_offset_xyz: [0.0, 0.0, 0.0]

verification:
  pass_threshold: 95.0
  min_expected_confidence: 0.0
  min_observation_confidence: 0.40
  min_alignment_coverage: 0.16
  max_centroid_offset_ratio: 0.95
  max_overlapping_instances: 1
  pixels_per_cell: 64
  max_warp_size: 2048
  frame_timeout_sec: 2.0
  live_overlay_rate_hz: 10.0
  live_segmentation_rate_hz: 1.0
  preview_grid_size: 8
