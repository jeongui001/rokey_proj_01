# Shared configuration for the color-mask image mosaic pipeline.

palette:
  entries:
    - {name: red,    rgb: [220, 35, 35],   occupied: true}
    - {name: blue,   rgb: [35, 80, 220],   occupied: true}
    - {name: green,  rgb: [40, 180, 70],   occupied: true}
    - {name: yellow, rgb: [235, 210, 45],  occupied: true}
    - {name: empty,  rgb: [95, 95, 95],    occupied: false}

mosaic:
  fit_mode: smart_crop        # center_crop | smart_crop
  smart_crop_min_scale: 0.80
  default_output_height: 512
  max_grid_size: 32
  draw_grid: true
  grid_line_thickness: 1

grid_projection:
  border_background_detection: false
  inner_cell_ratio: 0.90
  background_lab_distance: 34.0
  unknown_lab_distance: 96.0
  border_fraction: 0.04
  border_lab_distance: 28.0
  border_background_max_saturation: 55
  neutral_background_max_saturation: 35
  neutral_background_min_value: 155
  min_foreground_fraction: 0.05
  min_foreground_pixels: 8
  color_mask_kernel_size: 3
  color_mask_min_blob_area: 10
  component_mask_feature_fraction: 0.28
  hue_min_value: 45
  red_hue_min_saturation: 60
  yellow_hue_min_saturation: 55
  green_hue_min_saturation: 60
  blue_hue_min_saturation: 45
  blue_hue_min_value: 110
  blue_dark_min_saturation: 100
  blue_dark_min_value: 70
  overlay_alpha: 0.42
