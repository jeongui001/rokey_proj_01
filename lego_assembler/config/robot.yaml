# 두산 로봇 설정 (추후 실제 값으로 교체)
robot:
  model: "M0609"
  ip: "192.168.1.100"
  port: 12345
  speed: 50          # 기본 속도 (%)
  acceleration: 30   # 기본 가속도 (%)

workspace:
  origin: [300, 0, 150]   # 작업 원점 (mm)
  block_size: 8            # 블록 단위 크기 (mm)
  grid_offset_x: 0
  grid_offset_y: 0

camera:
  device_id: 0
  width: 1280
  height: 720
  fps: 30
